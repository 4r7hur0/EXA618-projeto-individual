{% extends "base.html" %}
{% block title %}Buscar aparelho{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-8">
    <h1 class="h3 mb-4 text-center">Buscar aparelho</h1>

    {% if erro %}
    <div class="alert alert-danger">{{ erro }}</div>
    {% endif %}
    {% if aviso %}
    <div class="alert alert-warning">{{ aviso }}</div>
    {% endif %}

    <div class="card shadow-sm">
      <div class="card-body p-4">
        <form id="form-busca" method="post" action="/buscar" class="position-relative">
          <div class="mb-3">
            <label class="form-label visually-hidden" for="q">Modelo</label>
            <input class="form-control form-control-lg" id="q" name="termo" placeholder="Ex.: Galaxy S25, iPhone 16…" required autocomplete="off" autofocus>
          </div>
          <button type="submit" id="btn-buscar" class="btn btn-primary btn-lg w-100">Buscar</button>
          <div id="loading-busca" class="d-none text-center py-4 mt-3 border-top">
            <div class="spinner-border text-primary" role="status"><span class="visually-hidden">Carregando…</span></div>
            <p class="text-muted small mt-2 mb-0">Consultando a base de dados…</p>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

<script>
(function () {
  var f = document.getElementById("form-busca");
  var btn = document.getElementById("btn-buscar");
  var load = document.getElementById("loading-busca");
  if (!f || !btn || !load) return;
  f.addEventListener("submit", function () {
    btn.disabled = true;
    load.classList.remove("d-none");
  });
})();
</script>
{% endblock %}
